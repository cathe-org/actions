name: Deploy to DigitalOcean

on:
  workflow_call:
    inputs:
      site_directory:
        description: Directory on server e.g. /var/www/cathe.dev
        required: true
        type: string
    secrets:
      WEBSERVER_IP:
        required: true
      WEBSERVER_USER:
        required: true
      WEBSERVER_SSH_PRIVATE_KEY:
        required: true
      WEBSERVER_SSH_PASSPHRASE:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEBSERVER_IP }}
          username: ${{ secrets.WEBSERVER_USER }}
          key: ${{ secrets.WEBSERVER_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.WEBSERVER_SSH_PASSPHRASE }}
          script: |
            cd ${{ inputs.site_directory }}
            git pull origin main