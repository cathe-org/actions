name: Deploy Docs
description: Copies generated docs to the web server

on:
  workflow_call:
    inputs:
      site:
        required: true
        type: string
      subdomain:
        required: true
        type: string
      org:
        required: true
        type: string
      subdir:
        required: false
        type: string
        default: ""
    secrets:
      WEBSERVER_IP:
        required: true
      WEBSERVER_USER:
        required: true
      WEBSERVER_SSH_PRIVATE_KEY:
        required: true
      WEBSERVER_SSH_PASSPHRASE:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEBSERVER_IP }}
          username: ${{ secrets.WEBSERVER_USER }}
          key: ${{ secrets.WEBSERVER_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.WEBSERVER_SSH_PASSPHRASE }}
          script: |
            TARGET="/var/www/${{ inputs.site }}/subdomains/${{ inputs.subdomain }}"
            if [ -d "$TARGET/.git" ]; then
              cd "$TARGET" && git pull origin main
            else
              git clone git@github.com:${{ inputs.org }}/${{ inputs.subdomain }}-docs.git "$TARGET"
            fi

            # Point Caddy at subdir if specified
            if [ -n "${{ inputs.subdir }}" ]; then
              ln -sfn "$TARGET/${{ inputs.subdir }}" "$TARGET/serve"
            fi
